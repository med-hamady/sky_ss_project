            <!-- Contact Form -->
            <div class="contact-form-wrapper">
                <!-- Form Type Toggle -->
                <div class="form-type-toggle" role="tablist" aria-label="Type de demande">
                    <button type="button" role="tab" class="toggle-btn"
                        [class.active]="formType === 'contact'"
                        (click)="setFormType('contact')"
                        [attr.aria-selected]="formType === 'contact'">
                        Message
                    </button>
                    <button type="button" role="tab" class="toggle-btn"
                        [class.active]="formType === 'devis'"
                        (click)="setFormType('devis')"
                        [attr.aria-selected]="formType === 'devis'">
                        Demande de devis
                    </button>
                </div>

                <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
                    <!-- Success/Error Message -->
                    <div *ngIf="submitMessage" class="submit-message" [class.success]="submitSuccess" [class.error]="!submitSuccess">
                        {{ submitMessage }}
                    </div>

                    <div class="form-group">
                        <label for="name">Nom complet</label>
                        <input type="text" id="name" name="name" [(ngModel)]="formData.name" required placeholder="Votre nom complet">
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" [(ngModel)]="formData.email" required placeholder="vous@exemple.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">{{ formType === 'devis' ? 'Type de projet' : 'Sujet' }}</label>
                        <input type="text" id="subject" name="subject" [(ngModel)]="formData.subject" required
                            [placeholder]="formType === 'devis' ? 'Ex. site web, application mobile, infrastructure réseau...' : 'Comment pouvons-nous vous aider ?'">
                    </div>

                    <div class="form-group">
                        <label for="message">{{ formType === 'devis' ? 'Détails du projet & budget estimé' : 'Message' }}</label>
                        <textarea id="message" name="message" [(ngModel)]="formData.message" required
                            [placeholder]="formType === 'devis' ? 'Décrivez votre projet, vos objectifs, vos contraintes et un budget approximatif si possible.' : 'Parlez-nous de votre besoin...'"
                            rows="5"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-large" [disabled]="!contactForm.valid || isSubmitting">
                        <span *ngIf="!isSubmitting">{{ formType === 'devis' ? 'Envoyer ma demande de devis' : 'Envoyer le message' }}</span>
                        <span *ngIf="isSubmitting">Envoi en cours...</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </form>
            </div>

</section>
